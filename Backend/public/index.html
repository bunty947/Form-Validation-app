<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation App</title>
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">


</head>
<body>

<h3 style="color:brown">Form Validation App</h3>
<div id="form-container">
           <form novalidate action="http://localhost:8080/register" method="post" autocomplete="off">
            <div class="form-group">
    <label for="username">Enter your full name</label>
    <div class="input-error">
    <input type="text" name="user" id="username" placeholder="Enter your name"autocapitalize="words" style="text-transform: capitalize;"/>
    <small id="name-error" class="error-message" ></small>

    </div>
    </div>
    <div class="form-group">
    <label for="email">Enter your mailing address</label>
    <div class="input-error">
    <input type="email" name="email" id="email" placeholder="Enter your email id"  autocomplete="off"  />
<small id="email-error" class="error-message"></small>

    </div>
    </div>
    <div class="form-group">
        
    <label for="UserPass">Enter your password</label>
    <div class="input-error">
        <div class="password-wrapper">
    <input type="password" name="password" id="UserPass" placeholder="Enter your password" minlength="6" maxlength="9" autocomplete="new-password" />
    <span id="togglePass">
        <i class="fa-solid fa-eye"></i>
    </span>
        </div>
        <small id="pass-error" class="error-message"></small>
    </div>
    </div>
   
 <div class="form-group">   
<label for="gender">Gender</label>
  <div class="input-error">
   <select name="Gender" id="gender">
    <option value="" disabled selected>Select your gender</option>
    <option value="male">Male</option>
    <option value="female">Female</option>
    <option value="others">Others</option>  
    </select>
    <small id="gender-error" class="error-message">
    </small>
 </div></div>

<div class="form-group">
    <label>Age Confirmation:</label>

    <div class="input-error">
        <div class="checkbox-group">
            <input type="checkbox" id="ageCheck" name="ageCheck">
            <label for="ageCheck">
                I confirm I am above 18 years old
            </label>
        </div>
        <small id="age-error" class="error-message"></small>
    </div>
</div>
<div class="button">
    <button type="submit" id="sub-butt">Submit</button>
    <input type="reset" value="Reset" id="rest-butt"/>
    </div>
</form>
</div>
</body>
<script src="app.js"></script>
</html>
